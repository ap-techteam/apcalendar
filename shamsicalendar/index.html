<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AP Calendar</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="calendar">

    <div class="header">

        <button id="prev">❮</button>

        <h1 id="title">
            AP Calendar
        </h1>

        <button id="next">❯</button>

    </div>


    <div class="controls">

        <button id="today">
            امروز
        </button>

    </div>


  <div class="weekdays">

    <div>شنبه</div>
    <div>یکشنبه</div>
    <div>دوشنبه</div>
    <div>سه‌شنبه</div>
    <div>چهارشنبه</div>
    <div>پنجشنبه</div>
    <div>جمعه</div>

</div>

    <div id="days" class="days">

    </div>


</div>


<script src="script.js"></script>

</body>
</html>
